<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Najwa ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:linear-gradient(135deg,#ffb6c1,#ff69b4);
    font-family:Arial,sans-serif;
    overflow:hidden;
}

button{
    padding:15px 35px;
    font-size:20px;
    border:none;
    border-radius:30px;
    background:white;
    color:#ff1493;
    cursor:pointer;
    font-weight:bold;
    box-shadow:0 0 15px rgba(255,255,255,0.8);
}

#pesan{
    display:none;
    text-align:center;
    color:white;
    margin-top:20px;
    animation:fadeIn 2s ease forwards;
}

h1{
    font-size:45px;
    margin-bottom:10px;
}

p{
    font-size:22px;
    max-width:600px;
    padding:0 15px;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.heart{
    position:absolute;
    color:white;
    font-size:25px;
    animation:terbang 5s linear infinite;
}

@keyframes terbang{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-100px);
        opacity:0;
    }
}
</style>
</head>
<body>

<button onclick="tampilPesan()">Klik Aku ❤️</button>

<div id="pesan">
    <h1>Najwa I Love You ❤️</h1>
    <p>
        Maafkan aku kalau selama ini aku pernah membuat kamu marah,
        mengecewakan, atau membuat hatimu sedih.
        Aku berharap kamu bisa memaafkanku. ❤️
    </p>
</div>

<script>
function tampilPesan(){
    document.getElementById("pesan").style.display="block";
}

setInterval(()=>{
    let heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";
    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },5000);
},300);
</script>

</body>
</html>
